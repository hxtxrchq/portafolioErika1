  <text x="170" y="410" fill="#15121a" font-family="Georgia, 'Times New Roman', serif" font-size="82">y Conversion</text>
  <text x="170" y="500" fill="#15121a" font-family="Arial, sans-serif" font-size="30" letter-spacing="2">PROYECTO ESTRATEGICO</text>
